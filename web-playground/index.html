<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Gloss Playground</title>
    <!-- OGP -->
    <meta property="og:title" content="Gloss Playground">
    <meta property="og:description" content="Ruby（ルビ）・Anno（注釈）・数式に対応した拡張 Markdown をリアルタイムでレンダリングするウェブ版プレイグラウンドです。">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Gloss Playground">
    <meta name="twitter:description" content="Ruby（ルビ）・Anno（注釈）・数式に対応した拡張 Markdown をリアルタイムでレンダリングするウェブ版プレイグラウンドです。">
    <link rel="css" href="src/style.css" data-trunk>
    <link data-trunk rel="rust" href="../src-web/Cargo.toml" data-wasm-opt="0" />
    <link data-trunk rel="copy-file" href="sample.n.md" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <!-- Google Fonts: Japanese serif/gothic/casual -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One&family=Shippori+Mincho&family=Zen+Kaku+Gothic+Antique&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-header: #121a2a;
            --border: #23304a;
            --text-header: #e6edf3;
            --bg-editor: #121a2a;
            --col-editor: #e6edf3;
            --bg-preview: #0b0f19;
            --col-preview: #cdd6f4;
            --col-accent: #7aa2f7;
        }
        [data-theme="light"] {
            --bg-header: #f0f2f7;
            --border: #c8ccd8;
            --text-header: #1a1e2e;
            --bg-editor: #f8f9fc;
            --col-editor: #1a1e2e;
            --bg-preview: #ffffff;
            --col-preview: #1a1e2e;
            --col-accent: #3456c8;
        }

        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: system-ui, sans-serif; background: var(--bg-header); }

        .header-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-header);
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }
        .header-title { color: var(--col-accent); font-weight: bold; font-size: 15px; white-space: nowrap; }
        .ctrl-group { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; }
        .ctrl-group label {
            color: var(--text-header);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            white-space: nowrap;
        }
        .ctrl-group select, .ctrl-group input[type=range] {
            accent-color: var(--col-accent);
            background: var(--bg-editor);
            color: var(--col-editor);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .ctrl-group input[type=range] { width: 80px; padding: 0; border: none; }
        #font-size-display { color: var(--text-header); font-size: 12px; min-width: 34px; }

        /* Theme toggle button */
        #theme-btn {
            cursor: pointer;
            background: var(--col-accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 3px 10px;
            font-size: 13px;
            line-height: 1.6;
            transition: background 0.2s;
        }
        #theme-btn:hover { opacity: 0.85; }

        .container { flex: 1; display: flex; overflow: hidden; }
        #editor, #preview { flex: 1; overflow: auto; padding: 16px; margin: 0; border: none; }
        #editor {
            background: var(--bg-editor);
            color: var(--col-editor);
            border-right: 1px solid var(--border);
            resize: none;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }
        #preview {
            background: var(--bg-preview);
            color: var(--col-preview);
            transition: background 0.2s, color 0.2s, font-size 0.15s, font-family 0.15s;
        }

        /* Ruby styling in preview */
        #preview ruby { ruby-align: center; }
        #preview rt { font-size: 0.5em; }

        /* Inline math = body text color */
        #preview .math-inline { color: inherit; }
        /* Ruby & Anno: base text at full weight, reading/annotation lighter */
        #preview .nm-ruby rb, #preview .nm-anno rb { opacity: 1; font-weight: inherit; }
        #preview .nm-ruby rt, #preview .nm-anno rt { color: inherit; opacity: 0.8; font-weight: 300; }
        /* Code blocks */
        #preview .nm-code, #preview .nm-code-inline {
            background-color: #1a1a1a !important;
            color: #f8f8f2 !important;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            line-height: 1.25;
        }
        #preview pre.nm-code { padding: 12px; margin: 1em 0; overflow-x: auto; border: 1px solid #333; line-height: 1.25; }

        /* Warnings box */
        #warnings-box {
            display: none;
            background: rgba(255,160,0,0.07);
            border-left: 3px solid #ffa000;
            color: #ffb300;
            padding: 8px 12px;
            margin: 0;
            font-size: 12px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            overflow-y: auto;
            max-height: 120px;
            border-bottom: 1px solid var(--border);
        }
        #warnings-box.has-warnings { display: block; }
        .warn-item { padding: 1px 0; }
        .warn-pos  { color: #888; margin-right: 4px; }
        .warn-code { color: #f0a060; font-weight: bold; margin-right: 4px; }
        .warn-msg  { color: #ffb300; }
    </style>
</head>
<body>
    <div class="header-controls">
        <span class="header-title">Gloss Playground</span>
        <div class="ctrl-group">
            <label>
                <input type="checkbox" id="use-katex" checked> KaTeX
            </label>
            <label>
                フォント
                <select id="font-select">
                    <option value="">システム</option>
                    <option value="'Klee One', cursive">Klee One</option>
                    <option value="'Zen Kaku Gothic Antique', sans-serif">Zen Kaku Gothic</option>
                    <option value="'Shippori Mincho', serif">Shippori Mincho</option>
                </select>
            </label>
            <label>
                サイズ
                <input type="range" id="font-size" min="10" max="28" value="16" step="1">
                <span id="font-size-display">16px</span>
            </label>
            <button id="theme-btn" title="テーマ切替">🌙 ダーク</button>
        </div>
    </div>
    <div id="warnings-box"></div>
    <div class="container">
        <textarea id="editor" placeholder="Write Gloss Markdown here..."></textarea>
        <div id="preview"></div>
    </div>
    <script>
        const preview      = document.getElementById('preview');
        const editor       = document.getElementById('editor');
        const warningsBox  = document.getElementById('warnings-box');
        const fontSelect   = document.getElementById('font-select');
        const fontSizeEl   = document.getElementById('font-size');
        const fontSizeDisp = document.getElementById('font-size-display');
        const themeBtn     = document.getElementById('theme-btn');
        const htmlEl       = document.documentElement;

        // ── Theme toggle ──────────────────────────────────────────
        let isDark = true;
        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            htmlEl.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeBtn.textContent = isDark ? '🌙 ダーク' : '☀️ ライト';
        });

        // ── Font family ───────────────────────────────────────────
        fontSelect.addEventListener('change', () => {
            preview.style.fontFamily = fontSelect.value;
        });

        // ── Font size ─────────────────────────────────────────────
        fontSizeEl.addEventListener('input', () => {
            const sz = fontSizeEl.value + 'px';
            preview.style.fontSize = sz;
            fontSizeDisp.textContent = sz;
        });

        // ── KaTeX rendering ────────────────────────────────────────
        // Renders math elements that haven't been rendered yet (no data-katex-tex set,
        // or whose source TeX changed).
        function renderKaTeX(root) {
            if (!document.getElementById('use-katex').checked || !window.katex) return;
            (root || preview).querySelectorAll('.math-inline, .math-display').forEach(el => {
                const texSpan = el.querySelector('.math-tex');
                if (!texSpan) return;
                const tex = texSpan.textContent;
                if (el.dataset.katexTex === tex) return; // already rendered, unchanged
                try {
                    katex.render(tex, el, {
                        displayMode: el.classList.contains('math-display'),
                        throwOnError: false
                    });
                    el.dataset.katexTex = tex;
                } catch(e) { console.error('[JS] KaTeX error:', e); }
            });
        }

        // ── Morphdom-like DOM differ ───────────────────────────────
        // Reconciles `preview` children against a new HTML string using data-bid keys.
        // Blocks whose bid is unchanged are kept in place (preserving KaTeX state).
        // New/changed blocks are inserted; removed blocks are deleted.
        function applyDiff(newHtml) {
            // Parse new HTML into a temporary container
            const tmp = document.createElement('div');
            tmp.innerHTML = newHtml;

            const newChildren = Array.from(tmp.children);
            const oldByBid = new Map();
            for (const child of preview.children) {
                const bid = child.dataset.bid;
                if (bid) oldByBid.set(bid, child);
            }

            // Build the new child list, reusing unchanged nodes
            const fragment = document.createDocumentFragment();
            const toRenderKaTeX = [];
            for (const newNode of newChildren) {
                const bid = newNode.dataset.bid;
                if (bid && oldByBid.has(bid)) {
                    // Reuse existing node (keeps KaTeX rendered state)
                    fragment.appendChild(oldByBid.get(bid));
                    oldByBid.delete(bid);
                } else {
                    // New or changed block
                    fragment.appendChild(newNode);
                    toRenderKaTeX.push(newNode);
                }
            }

            // Replace preview contents
            preview.innerHTML = '';
            preview.appendChild(fragment);

            // Only re-render KaTeX for new/changed blocks
            for (const node of toRenderKaTeX) {
                renderKaTeX(node);
            }
        }

        // ── Warnings display ───────────────────────────────────────
        function showWarnings(warnings) {
            if (!warnings || warnings.length === 0) {
                warningsBox.className = '';
                warningsBox.innerHTML = '';
                return;
            }
            warningsBox.className = 'has-warnings';
            warningsBox.innerHTML = warnings.map(w => {
                const pos = `${w.source}:${w.line}:${w.col}`;
                return `<div class="warn-item"><span class="warn-pos">${pos}</span><span class="warn-code">${escHtml(w.code)}</span><span class="warn-msg">${escHtml(w.message)}</span></div>`;
            }).join('');
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ── Main render function ───────────────────────────────────
        function render() {
            if (typeof render_with_warnings !== 'function') return;
            let result;
            try {
                result = JSON.parse(render_with_warnings(editor.value, 'playground.n.md'));
            } catch(e) {
                console.error('[JS] render_with_warnings failed:', e);
                return;
            }
            applyDiff(result.html);
            showWarnings(result.warnings);
        }

        // ── Editor input → re-render ───────────────────────────────
        let renderTimer = null;
        editor.addEventListener('input', () => {
            clearTimeout(renderTimer);
            renderTimer = setTimeout(render, 30);
        });

        document.getElementById('use-katex').addEventListener('change', () => {
            if (document.getElementById('use-katex').checked) {
                renderKaTeX();
            } else {
                // Re-render fully to restore plain math spans
                render();
            }
        });

        // ── Load sample on WASM ready ──────────────────────────────
        window.addEventListener('wasm-ready', () => {
            fetch('sample.n.md')
                .then(r => r.text())
                .then(text => {
                    editor.value = text;
                    render();
                })
                .catch(err => console.warn('Could not load sample.n.md:', err));
        });
    </script>
</body>
</html>
