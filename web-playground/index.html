<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Gloss Playground</title>
    <!-- OGP -->
    <meta property="og:title" content="Gloss Playground">
    <meta property="og:description" content="Ruby（ルビ）・Anno（注釈）・数式に対応した拡張 Markdown をリアルタイムでレンダリングするウェブ版プレイグラウンドです。">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Gloss Playground">
    <meta name="twitter:description" content="Ruby（ルビ）・Anno（注釈）・数式に対応した拡張 Markdown をリアルタイムでレンダリングするウェブ版プレイグラウンドです。">
    <link rel="css" href="src/style.css" data-trunk>
    <link data-trunk rel="rust" href="../src-web/Cargo.toml" data-wasm-opt="0" />
    <link data-trunk rel="copy-file" href="sample.n.md" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <!-- Google Fonts: Japanese serif/gothic/casual -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One&family=Shippori+Mincho&family=Zen+Kaku+Gothic+Antique&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-header: #121a2a;
            --border: #23304a;
            --text-header: #e6edf3;
            --bg-editor: #121a2a;
            --col-editor: #e6edf3;
            --bg-preview: #0b0f19;
            --col-preview: #cdd6f4;
            --col-accent: #7aa2f7;
        }
        [data-theme="light"] {
            --bg-header: #f0f2f7;
            --border: #c8ccd8;
            --text-header: #1a1e2e;
            --bg-editor: #f8f9fc;
            --col-editor: #1a1e2e;
            --bg-preview: #ffffff;
            --col-preview: #1a1e2e;
            --col-accent: #3456c8;
        }

        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: system-ui, sans-serif; background: var(--bg-header); }

        .header-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-header);
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }
        .header-title { color: var(--col-accent); font-weight: bold; font-size: 15px; white-space: nowrap; }
        .ctrl-group { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; }
        .ctrl-group label {
            color: var(--text-header);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            white-space: nowrap;
        }
        .ctrl-group select, .ctrl-group input[type=range] {
            accent-color: var(--col-accent);
            background: var(--bg-editor);
            color: var(--col-editor);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .ctrl-group input[type=range] { width: 80px; padding: 0; border: none; }
        #font-size-display { color: var(--text-header); font-size: 12px; min-width: 34px; }

        /* Theme toggle button */
        #theme-btn {
            cursor: pointer;
            background: var(--col-accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 3px 10px;
            font-size: 13px;
            line-height: 1.6;
            transition: background 0.2s;
        }
        #theme-btn:hover { opacity: 0.85; }

        .container { flex: 1; display: flex; overflow: hidden; }
        #editor, #preview { flex: 1; overflow: auto; padding: 16px; margin: 0; border: none; }
        #editor {
            background: var(--bg-editor);
            color: var(--col-editor);
            border-right: 1px solid var(--border);
            resize: none;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }
        #preview {
            background: var(--bg-preview);
            color: var(--col-preview);
            transition: background 0.2s, color 0.2s, font-size 0.15s, font-family 0.15s;
        }

        /* Ruby styling in preview */
        #preview ruby { ruby-align: center; }
        #preview rt { font-size: 0.5em; }

        /* User refined styles */
        /* 1. Inline math = body text color */
        #preview .math-inline {
            color: inherit;
        }
        /* 2. Ruby & Anno: only annotations (rt) are thinner/lighter */
        #preview .nm-ruby rb, #preview .nm-anno rb {
            opacity: 1;
            font-weight: inherit;
        }
        #preview .nm-ruby rt, #preview .nm-anno rt {
            color: inherit;
            opacity: 0.8;
            font-weight: 300;
        }
        /* 3. Code blocks = Fixed black bg, white text for both themes */
        #preview .nm-code, #preview .nm-code-inline {
            background-color: #1a1a1a !important;
            color: #f8f8f2 !important;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            line-height: 1.25;
        }
        #preview pre.nm-code {
            padding: 12px;
            margin: 1em 0;
            overflow-x: auto;
            border: 1px solid #333;
            line-height: 1.25;
        }
    </style>
</head>
<body>
    <div class="header-controls">
        <span class="header-title">Gloss Playground</span>
        <div class="ctrl-group">
            <label>
                <input type="checkbox" id="use-katex" checked> KaTeX
            </label>
            <label>
                フォント
                <select id="font-select">
                    <option value="">システム</option>
                    <option value="'Klee One', cursive">Klee One</option>
                    <option value="'Zen Kaku Gothic Antique', sans-serif">Zen Kaku Gothic</option>
                    <option value="'Shippori Mincho', serif">Shippori Mincho</option>
                </select>
            </label>
            <label>
                サイズ
                <input type="range" id="font-size" min="10" max="28" value="16" step="1">
                <span id="font-size-display">16px</span>
            </label>
            <button id="theme-btn" title="テーマ切替">🌙 ダーク</button>
        </div>
    </div>
    <div class="container">
        <textarea id="editor" placeholder="Write Gloss Markdown here..."></textarea>
        <div id="preview"></div>
    </div>
    <script>
        const preview = document.getElementById('preview');
        const editor  = document.getElementById('editor');
        const fontSelect  = document.getElementById('font-select');
        const fontSizeEl  = document.getElementById('font-size');
        const fontSizeDisp = document.getElementById('font-size-display');
        const themeBtn    = document.getElementById('theme-btn');
        const html        = document.documentElement;

        // ── Theme toggle ──────────────────────────────────────────
        let isDark = true;
        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            html.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeBtn.textContent = isDark ? '🌙 ダーク' : '☀️ ライト';
        });

        // ── Font family ───────────────────────────────────────────
        fontSelect.addEventListener('change', () => {
            preview.style.fontFamily = fontSelect.value;
        });

        // ── Font size ─────────────────────────────────────────────
        fontSizeEl.addEventListener('input', () => {
            const sz = fontSizeEl.value + 'px';
            preview.style.fontSize = sz;
            fontSizeDisp.textContent = sz;
        });

        // ── KaTeX rendering helper ─────────────────────────────────
        function renderKaTeX() {
            if (!document.getElementById('use-katex').checked || !window.katex) return;
            preview.querySelectorAll('.math-inline, .math-display').forEach(el => {
                const texSpan = el.querySelector('.math-tex');
                if (texSpan) {
                    try {
                        katex.render(texSpan.textContent, el, {
                            displayMode: el.classList.contains('math-display'),
                            throwOnError: false
                        });
                    } catch(e) { console.error('[JS] KaTeX error:', e); }
                }
            });
        }

        // ── Editor input → re-render ───────────────────────────────
        editor.addEventListener('input', () => {
            setTimeout(renderKaTeX, 20);
        });

        document.getElementById('use-katex').addEventListener('change', () => {
            editor.dispatchEvent(new Event('input'));
        });

        // ── Load sample on WASM ready ──────────────────────────────
        window.addEventListener('wasm-ready', () => {
            fetch('sample.n.md')
                .then(r => r.text())
                .then(text => {
                    editor.value = text;
                    editor.dispatchEvent(new Event('input'));
                })
                .catch(err => console.warn('Could not load sample.n.md:', err));
        });
    </script>
</body>
</html>
