<section class="nm-sec level-1">
<h1>テンプレート</h1>
<p><ruby class="nm-ruby"><rb>新</rb><rt>あたら</rt></ruby>しい<ruby class="nm-ruby"><rb>文書</rb><rt>ぶんしょ</rt></ruby>を<ruby class="nm-ruby"><rb>書</rb><rt>か</rt></ruby>くときは、これを<ruby class="nm-ruby"><rb>複製</rb><rt>ふくせい</rt></ruby>して<ruby class="nm-ruby"><rb>使</rb><rt>つか</rt></ruby>ってください。</p>
<section class="nm-sec level-2">
<h2><ruby class="nm-ruby"><rb>題名</rb><rt>だいめい</rt></ruby>（<code class="nm-code-inline">##</code>）</h2>
<p><ruby class="nm-gloss"><rb><ruby class="nm-ruby"><rb>用語</rb><rt>ようご</rt></ruby></rb><rt><span class="nm-gloss-note">term</span></rt></ruby> を<ruby class="nm-ruby"><rb>導入</rb><rt>どうにゅう</rt></ruby>する。</p>
<section class="nm-sec level-3">
<h3><ruby class="nm-ruby"><rb>小</rb><rt>しょう</rt></ruby><ruby class="nm-ruby"><rb>節</rb><rt>せつ</rt></ruby>（<code class="nm-code-inline">###</code>）</h3>
<p><code class="nm-code-inline">[例/れい]</code>：<ruby class="nm-gloss"><rb><ruby class="nm-ruby"><rb>微分</rb><rt>びぶん</rt></ruby><ruby class="nm-ruby"><rb>係数</rb><rt>けいすう</rt></ruby></rb><rt><span class="nm-gloss-note">derivative</span></rt></ruby> と <code class="nm-code-inline">{[接線/せっせん]/tangent}</code>。</p>
</section>
<p>ここから<ruby class="nm-ruby"><rb>親</rb><rt>おや</rt></ruby><ruby class="nm-ruby"><rb>節</rb><rt>せつ</rt></ruby>に<ruby class="nm-ruby"><rb>戻</rb><rt>もど</rt></ruby>る。</p>
</section>
<hr/>
<p>ここで<ruby class="nm-ruby"><rb>水平線</rb><rt>すいへいせん</rt></ruby>＋ 1<ruby class="nm-ruby"><rb>段</rb><rt>だん</rt></ruby> close。</p>
<section class="nm-sec level-2">
<h2><ruby class="nm-ruby"><rb>別</rb><rt>べつ</rt></ruby>の<ruby class="nm-ruby"><rb>題名</rb><rt>だいめい</rt></ruby>（<code class="nm-code-inline">##</code>）</h2>
<p><ruby class="nm-ruby"><rb>次</rb><rt>つぎ</rt></ruby>の<ruby class="nm-ruby"><rb>節</rb><rt>せつ</rt></ruby>。</p>
</section>
